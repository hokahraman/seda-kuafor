<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Seda Kuaför</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ivory: #FAF6F0;
    --cream: #F2EAE0;
    --wine: #6B2D3E;
    --wine-light: #8B4558;
    --gold: #C4955A;
    --gold-light: #D9B483;
    --blush: #EDD5C5;
    --text: #2C1810;
    --text-soft: #7A6055;
    --green: #3A7D5B;
    --red: #C0392B;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: #F4EEE7;
    color: var(--text);
    font-weight: 300;
    min-height: 100vh;
  }

  /* SIDEBAR */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 260px; min-height: 100vh;
    background: var(--wine);
    display: flex; flex-direction: column;
    padding: 0;
    position: fixed; top: 0; left: 0; bottom: 0;
    z-index: 50;
  }

  .sidebar-logo {
    padding: 32px 28px 24px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .sidebar-logo h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem; color: #fff; line-height: 1.2;
  }
  .sidebar-logo h1 em { color: var(--gold-light); }
  .sidebar-logo p { font-size: 0.72rem; color: rgba(255,255,255,0.5); margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }

  .sidebar-nav { padding: 24px 16px; flex: 1; }
  .nav-label {
    font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: rgba(255,255,255,0.4); padding: 0 12px; margin-bottom: 8px; margin-top: 20px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 8px;
    color: rgba(255,255,255,0.75);
    cursor: pointer; font-size: 0.88rem;
    transition: all 0.2s; margin-bottom: 4px;
    user-select: none;
  }
  .nav-item:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 500; }
  .nav-item .icon { font-size: 1rem; width: 20px; text-align: center; }

  .sidebar-footer {
    padding: 20px 28px;
    border-top: 1px solid rgba(255,255,255,0.1);
    font-size: 0.78rem; color: rgba(255,255,255,0.4);
  }
  .sidebar-footer a { color: var(--gold-light); text-decoration: none; font-size: 0.82rem; }

  /* MAIN */
  .main {
    margin-left: 260px;
    flex: 1;
    padding: 32px 36px;
    min-height: 100vh;
  }

  .topbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 32px;
  }
  .topbar h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem; color: var(--wine);
  }
  .topbar h2 em { font-style: italic; color: var(--gold); }

  .add-btn {
    padding: 11px 28px;
    background: var(--wine); color: #fff; border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem; letter-spacing: 0.1em;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .add-btn:hover { background: var(--wine-light); }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card {
    background: #fff; padding: 24px 20px;
    border-left: 3px solid transparent;
  }
  .stat-card.bekliyor { border-color: var(--gold); }
  .stat-card.onaylandi { border-color: var(--green); }
  .stat-card.iptal { border-color: var(--red); }
  .stat-card.bugun { border-color: var(--wine); }

  .stat-label { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); margin-bottom: 8px; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--text); line-height: 1; }

  /* FILTERS */
  .filters {
    display: flex; gap: 12px; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 8px 20px; border: 1px solid rgba(196,149,90,0.4);
    background: #fff; color: var(--text-soft);
    font-family: 'Jost', sans-serif; font-size: 0.82rem;
    cursor: pointer; transition: all 0.2s;
  }
  .filter-btn:hover { border-color: var(--wine); color: var(--wine); }
  .filter-btn.active { background: var(--wine); color: #fff; border-color: var(--wine); }

  input[type="date"].filter-date {
    padding: 8px 16px;
    border: 1px solid rgba(196,149,90,0.4);
    background: #fff;
    font-family: 'Jost', sans-serif;
    font-size: 0.82rem; color: var(--text);
    outline: none;
  }
  input[type="date"].filter-date:focus { border-color: var(--wine); }

  /* CALENDAR WEEK VIEW */
  .calendar-container { background: #fff; margin-bottom: 24px; overflow-x: auto; }
  .calendar-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 24px;
    border-bottom: 1px solid var(--cream);
  }
  .cal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem; color: var(--wine);
  }
  .cal-nav { display: flex; gap: 8px; }
  .cal-nav button {
    padding: 6px 14px; border: 1px solid rgba(196,149,90,0.4);
    background: #fff; cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.8rem; color: var(--text-soft);
    transition: all 0.2s;
  }
  .cal-nav button:hover { background: var(--wine); color: #fff; border-color: var(--wine); }

  .week-grid {
    display: grid;
    grid-template-columns: 70px repeat(7, 1fr);
    min-width: 700px;
  }
  .week-day-header {
    padding: 14px 8px; text-align: center;
    border-bottom: 1px solid var(--cream);
    border-left: 1px solid var(--cream);
    font-size: 0.75rem;
  }
  .week-day-header .day-name { font-weight: 500; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); }
  .week-day-header .day-num {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--text);
    margin-top: 2px;
  }
  .week-day-header.today .day-num { color: var(--wine); font-weight: 600; }
  .week-day-header.closed { background: rgba(0,0,0,0.02); }
  .week-day-header.closed .day-name { color: #ccc; }

  .time-label-col { /* empty top-left corner */}
  .time-row {
    display: contents;
  }
  .hour-label {
    padding: 0 8px;
    height: 52px;
    display: flex; align-items: center;
    font-size: 0.72rem; color: var(--text-soft);
    border-top: 1px solid var(--cream);
    justify-content: flex-end;
  }
  .day-cell {
    border-left: 1px solid var(--cream);
    border-top: 1px solid var(--cream);
    height: 52px;
    position: relative;
    padding: 2px;
  }
  .day-cell.closed { background: repeating-linear-gradient(45deg, transparent, transparent 6px, rgba(0,0,0,0.015) 6px, rgba(0,0,0,0.015) 12px); }

  .cal-appt {
    position: absolute; left: 2px; right: 2px; top: 2px;
    padding: 3px 6px;
    font-size: 0.7rem; border-radius: 2px;
    cursor: pointer; overflow: hidden;
    white-space: nowrap; text-overflow: ellipsis;
    z-index: 2;
    transition: opacity 0.2s;
  }
  .cal-appt:hover { opacity: 0.85; }
  .cal-appt.bekliyor { background: rgba(196,149,90,0.2); color: #7A5020; border-left: 2px solid var(--gold); }
  .cal-appt.onaylandi { background: rgba(58,125,91,0.15); color: #1E5C3A; border-left: 2px solid var(--green); }
  .cal-appt.iptal { background: rgba(192,57,43,0.1); color: #922B21; border-left: 2px solid var(--red); text-decoration: line-through; }

  /* APPOINTMENT LIST */
  .appt-list { display: flex; flex-direction: column; gap: 10px; }

  .appt-card {
    background: #fff;
    display: grid; grid-template-columns: 4px 1fr auto;
    overflow: hidden;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .appt-card:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(107,45,62,0.08); }

  .appt-status-bar { width: 4px; }
  .appt-status-bar.bekliyor { background: var(--gold); }
  .appt-status-bar.onaylandi { background: var(--green); }
  .appt-status-bar.iptal { background: var(--red); }

  .appt-body { padding: 18px 20px; }
  .appt-top { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .appt-name {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; color: var(--text);
  }
  .appt-badge {
    font-size: 0.67rem; letter-spacing: 0.12em; text-transform: uppercase;
    padding: 3px 10px;
  }
  .appt-badge.bekliyor { background: rgba(196,149,90,0.15); color: #8B5C1A; }
  .appt-badge.onaylandi { background: rgba(58,125,91,0.12); color: #1E5C3A; }
  .appt-badge.iptal { background: rgba(192,57,43,0.1); color: #922B21; }

  .appt-meta { font-size: 0.83rem; color: var(--text-soft); display: flex; gap: 16px; flex-wrap: wrap; }
  .appt-meta span { display: flex; align-items: center; gap: 4px; }

  .appt-actions {
    padding: 16px 16px;
    display: flex; flex-direction: column; gap: 6px;
    justify-content: center; align-items: flex-end;
    min-width: 160px;
  }

  .action-btn {
    padding: 7px 16px; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.78rem;
    transition: opacity 0.2s; width: 100%; text-align: center;
  }
  .action-btn.onay { background: var(--green); color: #fff; }
  .action-btn.red { background: var(--red); color: #fff; }
  .action-btn.wa { background: #25D366; color: #fff; text-decoration: none; display: block; }
  .action-btn:hover { opacity: 0.85; }

  /* MANUAL ADD MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(44,24,16,0.5); z-index: 200;
    justify-content: center; align-items: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--ivory); width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto;
    padding: 40px;
    animation: fadeUp 0.25s ease;
  }
  .modal h3 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; color: var(--wine); margin-bottom: 24px;
  }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .modal-grid .full { grid-column: 1/-1; }
  .modal label { font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-soft); display: block; margin-bottom: 6px; }
  .modal input, .modal select {
    width: 100%; border: 1px solid rgba(196,149,90,0.35);
    background: #fff; padding: 12px 14px;
    font-family: 'Jost', sans-serif; font-size: 0.9rem;
    outline: none; appearance: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--wine); }
  .modal-actions { display: flex; gap: 12px; margin-top: 24px; }
  .modal-btn {
    flex: 1; padding: 13px; border: none; cursor: pointer;
    font-family: 'Jost', sans-serif; font-size: 0.85rem; letter-spacing: 0.1em;
  }
  .modal-btn.primary { background: var(--wine); color: #fff; }
  .modal-btn.secondary { background: transparent; border: 1px solid rgba(196,149,90,0.4); color: var(--text-soft); }

  .empty-state {
    text-align: center; padding: 64px 32px;
    color: var(--text-soft);
    background: #fff;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 16px; }
  .empty-state p { font-size: 0.9rem; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 900px) {
    .sidebar { width: 60px; }
    .sidebar-logo, .sidebar-footer, .nav-item span, .nav-label { display: none; }
    .nav-item { justify-content: center; }
    .main { margin-left: 60px; padding: 20px 16px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .appt-actions { min-width: unset; }
  }
</style>
</head>
<body>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <h1>Seda <em>Kuaför</em></h1>
      <p>Admin Paneli</p>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-label">Yönetim</div>
      <div class="nav-item active" onclick="showView('takvim')">
        <span class="icon">📅</span><span>Takvim</span>
      </div>
      <div class="nav-item" onclick="showView('liste')">
        <span class="icon">📋</span><span>Randevular</span>
      </div>
      <div class="nav-label">Hızlı</div>
      <div class="nav-item" onclick="openModal()">
        <span class="icon">➕</span><span>Randevu Ekle</span>
      </div>
      <div class="nav-item" onclick="window.open('index.html','_blank')">
        <span class="icon">🌐</span><span>Müşteri Sitesi</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <a href="index.html" target="_blank">→ Müşteri Sitesini Aç</a>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <h2 id="view-title">Randevu <em>Takvimi</em></h2>
      <button class="add-btn" onclick="openModal()">➕ Randevu Ekle</button>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="stat-card bugun">
        <div class="stat-label">Bugün</div>
        <div class="stat-num" id="stat-today">0</div>
      </div>
      <div class="stat-card bekliyor">
        <div class="stat-label">Bekliyor</div>
        <div class="stat-num" id="stat-bekliyor">0</div>
      </div>
      <div class="stat-card onaylandi">
        <div class="stat-label">Onaylandı</div>
        <div class="stat-num" id="stat-onaylandi">0</div>
      </div>
      <div class="stat-card iptal">
        <div class="stat-label">İptal</div>
        <div class="stat-num" id="stat-iptal">0</div>
      </div>
    </div>

    <!-- TAKVIM VIEW -->
    <div id="view-takvim">
      <div class="calendar-container">
        <div class="calendar-header">
          <span class="cal-title" id="cal-week-title"></span>
          <div class="cal-nav">
            <button onclick="changeWeek(-1)">← Önceki Hafta</button>
            <button onclick="changeWeek(0)">Bu Hafta</button>
            <button onclick="changeWeek(1)">Sonraki Hafta →</button>
          </div>
        </div>
        <div class="week-grid" id="week-grid"></div>
      </div>
    </div>

    <!-- LİSTE VIEW -->
    <div id="view-liste" style="display:none">
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('hepsi', this)">Hepsi</button>
        <button class="filter-btn" onclick="setFilter('bekliyor', this)">Bekliyor</button>
        <button class="filter-btn" onclick="setFilter('onaylandi', this)">Onaylandı</button>
        <button class="filter-btn" onclick="setFilter('iptal', this)">İptal</button>
        <input type="date" class="filter-date" id="filter-date" onchange="renderList()">
        <button class="filter-btn" onclick="document.getElementById('filter-date').value=''; renderList()">Tarihi Sıfırla</button>
      </div>
      <div class="appt-list" id="appt-list"></div>
    </div>
  </main>
</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>Yeni Randevu Ekle</h3>
    <div class="modal-grid">
      <div>
        <label>Ad Soyad</label>
        <input type="text" id="m-name" placeholder="Müşteri adı">
      </div>
      <div>
        <label>Telefon</label>
        <input type="tel" id="m-phone" placeholder="05XX XXX XX XX">
      </div>
      <div>
        <label>Hizmet</label>
        <select id="m-service">
          <option value="Saç Kesimi">Saç Kesimi</option>
          <option value="Boya / Röfle">Boya / Röfle</option>
          <option value="Manikür / Pedikür">Manikür / Pedikür</option>
        </select>
      </div>
      <div>
        <label>Durum</label>
        <select id="m-status">
          <option value="onaylandi">Onaylandı</option>
          <option value="bekliyor">Bekliyor</option>
        </select>
      </div>
      <div>
        <label>Tarih</label>
        <input type="date" id="m-date">
      </div>
      <div>
        <label>Saat</label>
        <select id="m-time"></select>
      </div>
      <div class="full">
        <label>Not</label>
        <input type="text" id="m-note" placeholder="İsteğe bağlı not">
      </div>
    </div>
    <div class="modal-actions">
      <button class="modal-btn secondary" onclick="closeModal()">İptal</button>
      <button class="modal-btn primary" onclick="saveManual()">Kaydet</button>
    </div>
  </div>
</div>

<script>
const WA_NUMBER = '905378731929';
const CLOSED_DAY = 2;
const DAYS_TR = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const MONTHS_TR = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];

let currentFilter = 'hepsi';
let weekOffset = 0;
let currentView = 'takvim';

function getAppointments() {
  return JSON.parse(localStorage.getItem('seda_appointments') || '[]');
}
function saveAppointments(arr) {
  localStorage.setItem('seda_appointments', JSON.stringify(arr));
}

function todayStr() {
  return new Date().toISOString().split('T')[0];
}

function updateStats() {
  const all = getAppointments();
  const today = todayStr();
  document.getElementById('stat-today').textContent = all.filter(a => a.date === today && a.status !== 'iptal').length;
  document.getElementById('stat-bekliyor').textContent = all.filter(a => a.status === 'bekliyor').length;
  document.getElementById('stat-onaylandi').textContent = all.filter(a => a.status === 'onaylandi').length;
  document.getElementById('stat-iptal').textContent = all.filter(a => a.status === 'iptal').length;
}

// WEEK CALENDAR
function getWeekStart(offset) {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + 1; // week starts Monday
  d.setDate(diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}

function changeWeek(dir) {
  if (dir === 0) weekOffset = 0;
  else weekOffset += dir;
  renderCalendar();
}

function renderCalendar() {
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  const weekStart = getWeekStart(weekOffset);
  const weekEnd = new Date(weekStart); weekEnd.setDate(weekEnd.getDate() + 6);

  const startStr = `${weekStart.getDate()} ${MONTHS_TR[weekStart.getMonth()]}`;
  const endStr = `${weekEnd.getDate()} ${MONTHS_TR[weekEnd.getMonth()]} ${weekEnd.getFullYear()}`;
  document.getElementById('cal-week-title').textContent = `${startStr} – ${endStr}`;

  const appts = getAppointments();
  const today = todayStr();

  // Days: Mon(1) to Sun(7) → indices 0-6
  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    weekDays.push(d);
  }

  // Header row
  const emptyCorner = document.createElement('div');
  emptyCorner.style.cssText = 'border-bottom:1px solid #F2EAE0; background:#fff;';
  grid.appendChild(emptyCorner);

  weekDays.forEach(d => {
    const h = document.createElement('div');
    const dateStr = d.toISOString().split('T')[0];
    const isClosed = d.getDay() === CLOSED_DAY;
    const isToday = dateStr === today;
    h.className = 'week-day-header' + (isClosed ? ' closed' : '') + (isToday ? ' today' : '');
    h.innerHTML = `<div class="day-name">${DAYS_TR[d.getDay()].substring(0,3)}</div><div class="day-num">${d.getDate()}</div>`;
    grid.appendChild(h);
  });

  // Hour rows
  for (let h = 9; h <= 18; h++) {
    for (let m = 0; m < 60; m += 30) {
      if (h === 18 && m > 30) break;
      const timeStr = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;

      const lbl = document.createElement('div');
      lbl.className = 'hour-label';
      lbl.textContent = timeStr;
      grid.appendChild(lbl);

      weekDays.forEach(d => {
        const dateStr = d.toISOString().split('T')[0];
        const isClosed = d.getDay() === CLOSED_DAY;
        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isClosed ? ' closed' : '');

        if (!isClosed) {
          const slotAppts = appts.filter(a => a.date === dateStr && a.time === timeStr);
          slotAppts.forEach(a => {
            const chip = document.createElement('div');
            chip.className = `cal-appt ${a.status}`;
            chip.textContent = a.name + ' · ' + a.service;
            chip.title = `${a.name} | ${a.service} | ${a.phone}`;
            chip.onclick = () => openDetailModal(a.id);
            cell.appendChild(chip);
          });
        }
        grid.appendChild(cell);
      });
    }
  }
}

// LIST VIEW
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const all = getAppointments();
  const dateFilter = document.getElementById('filter-date').value;

  let filtered = all;
  if (currentFilter !== 'hepsi') filtered = filtered.filter(a => a.status === currentFilter);
  if (dateFilter) filtered = filtered.filter(a => a.date === dateFilter);

  filtered.sort((a,b) => (a.date + a.time).localeCompare(b.date + b.time));

  const container = document.getElementById('appt-list');
  container.innerHTML = '';

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Bu filtreye uygun randevu bulunamadı.</p></div>`;
    return;
  }

  filtered.forEach(a => {
    const d = new Date(a.date + 'T00:00:00');
    const dateFormatted = `${DAYS_TR[d.getDay()]}, ${d.getDate()} ${MONTHS_TR[d.getMonth()]}`;
    const statusLabel = { bekliyor: '⏳ Bekliyor', onaylandi: '✅ Onaylandı', iptal: '❌ İptal' }[a.status];
    const waMsg = encodeURIComponent(`Merhaba ${a.name}! Seda Kuaför'den arıyoruz. ${dateFormatted} ${a.time} randevunuz onaylandı. Görüşmek üzere! 💇‍♀️`);

    const card = document.createElement('div');
    card.className = 'appt-card';
    card.innerHTML = `
      <div class="appt-status-bar ${a.status}"></div>
      <div class="appt-body">
        <div class="appt-top">
          <span class="appt-name">${a.name}</span>
          <span class="appt-badge ${a.status}">${statusLabel}</span>
        </div>
        <div class="appt-meta">
          <span>✂️ ${a.service}</span>
          <span>📅 ${dateFormatted}</span>
          <span>🕐 ${a.time}</span>
          <span>📞 ${a.phone}</span>
          ${a.note ? `<span>📝 ${a.note}</span>` : ''}
        </div>
      </div>
      <div class="appt-actions">
        ${a.status === 'bekliyor' ? `<button class="action-btn onay" onclick="updateStatus('${a.id}','onaylandi')">✅ Onayla</button>` : ''}
        ${a.status !== 'iptal' ? `<button class="action-btn red" onclick="updateStatus('${a.id}','iptal')">❌ İptal Et</button>` : ''}
        <a class="action-btn wa" href="https://wa.me/${WA_NUMBER.replace('90','0')}?text=${waMsg}" target="_blank">📱 WhatsApp</a>
      </div>`;
    container.appendChild(card);
  });
}

function updateStatus(id, status) {
  const all = getAppointments();
  const idx = all.findIndex(a => a.id === id);
  if (idx > -1) { all[idx].status = status; saveAppointments(all); }
  refresh();
}

function openDetailModal(id) {
  // Quick: switch to list and show
  showView('liste');
  // highlight?
  renderList();
}

// MANUAL ADD
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('m-date').value = today;
  document.getElementById('m-date').min = today;
  populateTimeSelect();
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function populateTimeSelect() {
  const sel = document.getElementById('m-time');
  sel.innerHTML = '';
  for (let h = 9; h <= 18; h++) {
    for (let m = 0; m < 60; m += 30) {
      if (h === 18 && m > 30) break;
      const t = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
      sel.innerHTML += `<option value="${t}">${t}</option>`;
    }
  }
}

function saveManual() {
  const name = document.getElementById('m-name').value.trim();
  const phone = document.getElementById('m-phone').value.trim();
  const service = document.getElementById('m-service').value;
  const status = document.getElementById('m-status').value;
  const date = document.getElementById('m-date').value;
  const time = document.getElementById('m-time').value;
  const note = document.getElementById('m-note').value.trim();

  if (!name || !phone || !date) { alert('Ad, telefon ve tarih zorunludur.'); return; }

  const all = getAppointments();
  all.push({ id: Date.now().toString(), name, phone, service, status, date, time, note, createdAt: new Date().toISOString() });
  saveAppointments(all);
  closeModal();
  document.getElementById('m-name').value = '';
  document.getElementById('m-phone').value = '';
  document.getElementById('m-note').value = '';
  refresh();
}

function showView(v) {
  currentView = v;
  document.getElementById('view-takvim').style.display = v === 'takvim' ? 'block' : 'none';
  document.getElementById('view-liste').style.display = v === 'liste' ? 'block' : 'none';
  document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
  document.querySelectorAll('.nav-item')[v === 'takvim' ? 0 : 1].classList.add('active');
  const titles = { takvim: 'Randevu <em>Takvimi</em>', liste: 'Tüm <em>Randevular</em>' };
  document.getElementById('view-title').innerHTML = titles[v];
}

function refresh() {
  updateStats();
  if (currentView === 'takvim') renderCalendar();
  else renderList();
}

// Close modal on overlay click
document.getElementById('modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
updateStats();
renderCalendar();
</script>
</body>
</html>
